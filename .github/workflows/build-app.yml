name: Build StemForge Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build macOS App
      run: |
        bash build_mac.sh

    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StemForge-macOS
        path: StemForge.dmg
        retention-days: 7

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: StemForge.dmg

  build-win:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Windows App
      run: |
        pwsh ./build_win.ps1

    - name: Upload ZIP Artifact
      uses: actions/upload-artifact@v4
      with:
        name: StemForge-Windows
        path: StemForge-Windows.zip
        retention-days: 7

    - name: Upload to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: StemForge-Windows.zip
